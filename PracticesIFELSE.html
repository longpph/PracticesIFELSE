<!DOCTYPE html>
<html>
<head lang="vi">
    <meta charset="utf-8">
    <title>Practices If-Else</title>
</head>
<body>
    <!-- Bài 1 -->
    <h2>Chương trình chuyển từ độ C sang độ F</h2>
    <label for="doC">Nhập độ C:</label>
    <input type="number" id="doC" placeholder="Ví dụ: 30">
    <button onclick="chuyenDoi()">Chuyển đổi</button>
    <h3 id="ketQua">Kết quả sẽ hiển thị ở đây</h3>
    <script>
        function chuyenDoi() {
            let celsius = document.getElementById("doC").value;
            if (celsius === "") {
                alert("Vui lòng nhập vào một số!");
                return;
            }
            celsius = parseFloat(celsius);
            let fahrenheit = (celsius * 1.8) + 32;
            document.getElementById("ketQua").innerHTML = celsius + "°C bằng " + fahrenheit + "°F <br>";
        }
    </script>
</body>
</html>
